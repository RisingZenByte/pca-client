name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Download compile-only dependencies
        run: |
          mkdir -p libs
          curl -L -o libs/malilib-fabric-26.2-0.29.2.jar "https://cdn.modrinth.com/data/GcWjdA9I/versions/52cWF5Da/malilib-fabric-26.2-0.29.2.jar"
          curl -L -o libs/tweakeroo-fabric-26.2-0.29.2.jar "https://cdn.modrinth.com/data/t5wuYk45/versions/ctaUxCzN/tweakeroo-fabric-26.2-0.29.2.jar"

      - name: Build release jar
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Resolve release jar
        id: asset
        run: |
          JAR=$(ls build/libs/pca-client-*-mc*.jar | grep -v sources)
          echo "jar=$JAR" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.asset.outputs.jar }}
          generate_release_notes: true
          fail_on_unmatched_files: true
