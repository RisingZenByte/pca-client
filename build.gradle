plugins {
	id 'net.fabricmc.fabric-loom' version '1.17-SNAPSHOT'
	id 'maven-publish'
}

version = "${mod_version}-mc${minecraft_version}"
group = maven_group

base {
	archivesName = archives_base_name
}

repositories {
	maven { url = 'https://maven.fallenbreath.me/releases' }
}

dependencies {
	minecraft "com.mojang:minecraft:${minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${loader_version}"

	implementation "net.fabricmc.fabric-api:fabric-api:0.153.0+26.2"
	include(implementation("me.fallenbreath:fanetlib:${fanetlib_version}-mc26.1.1"))

	compileOnly files('libs/malilib-fabric-26.2-0.29.2.jar')
	compileOnly files('libs/tweakeroo-fabric-26.2-0.29.2.jar')
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
}

processResources {
	def props = [
			'version'              : version,
			'minecraft_dependency' : minecraft_dependency,
	]
	inputs.properties props
	filesMatching('fabric.mod.json') {
		expand props
	}
}

jar {
	from('LICENSE') {
		rename { "${it}_${base.archivesName.get()}" }
	}
}
